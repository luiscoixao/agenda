<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<link rel="apple-touch-icon" href="icon.png" />
<title>Rappels</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#f3f3f6;
  --text:#111;
  --muted:#a1a1aa;
  --accent:#ff0a78;
  --line:#ececf1;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:28px 18px 110px;
}

.app{max-width:760px;margin:0 auto}

h1{
  margin:0 0 26px;
  font-size:46px;
  font-weight:800;
  letter-spacing:-0.04em;
  color:var(--accent);
}

.list{display:flex;flex-direction:column}

.task{
  display:grid;
  grid-template-columns:28px 1fr;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid var(--line);
  transform:translateX(0);
  transition:transform .18s ease;
}

.task-bullet{
  width:20px;
  height:20px;
  border-radius:50%;
  border:1.5px solid #d1d1d6;
  margin-top:6px;
}

.task-title{font-size:18px;font-weight:500}

.task-meta{
  margin-top:6px;
  font-size:14px;
  color:var(--accent);
  display:flex;
  gap:10px;
}

.task-empty{color:var(--muted);font-size:17px}

.editor-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.2);
  display:none;
  align-items:flex-end;
  padding:12px;
}

.editor-backdrop.open{display:flex}

.editor-sheet{
  width:100%;
  background:#fff;
  border-radius:28px;
  padding:18px;
}

.editor-title{
  font-size:22px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:12px;
}

.field{
  width:100%;
  padding:14px;
  border-radius:18px;
  border:1px solid #e7e7ec;
  margin-bottom:12px;
  font-size:17px;
  flex:1;
  min-width:0;
}

.field:focus{
  border-color:var(--accent);
  background:#fff;
}

.row{
  display:flex;
  gap:10px;
}

input[type="date"],
input[type="time"]{
  -webkit-appearance:none;
  appearance:none;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:8px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:18px;
  font-weight:700;
  border:none;
}

.btn-cancel{background:#f2f2f7}
.btn-save{background:var(--accent);color:#fff}

.fab{
  position:fixed;
  right:22px;
  bottom:28px;
  width:76px;
  height:76px;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  font-size:42px;
  border:none;
}

</style>
</head>

<body>

<div class="app">
  <h1>Rappels</h1>
  <div id="taskList" class="list"></div>
  <div id="emptyState" class="task-empty">Aucun rappel</div>
</div>

<button id="fab" class="fab">+</button>

<div id="editorBackdrop" class="editor-backdrop">
  <div class="editor-sheet">
    <div class="editor-title">Nouveau rappel</div>

    <input id="taskText" class="field" placeholder="Intitulé"/>

    <div class="row">
      <input id="taskDate" type="date" class="field"/>
      <input id="taskTime" type="time" class="field" value="09:00"/>
    </div>

    <div class="actions">
      <button id="cancelBtn" class="btn btn-cancel">Annuler</button>
      <button id="saveBtn" class="btn btn-save">Enregistrer</button>
    </div>
  </div>
</div>

<script>
function getTasks(){return JSON.parse(localStorage.getItem("tasks")||"[]")}
function saveTasks(t){localStorage.setItem("tasks",JSON.stringify(t))}

function render(){
  const list=document.getElementById("taskList")
  const empty=document.getElementById("emptyState")
  const tasks=getTasks()

  list.innerHTML=""

  if(!tasks.length){
    empty.style.display="block"
    return
  }

  empty.style.display="none"

  tasks.forEach(task=>{
    const el=document.createElement("div")
    el.className="task"
    el.innerHTML=`
      <div class="task-bullet"></div>
      <div>
        <div class="task-title">${task.text}</div>
        <div class="task-meta">${task.date||""} ${task.time||""}</div>
      </div>
    `
    list.appendChild(el)
  })
}

document.getElementById("fab").onclick=()=>openEditor()
document.getElementById("cancelBtn").onclick=closeEditor
document.getElementById("saveBtn").onclick=save

function openEditor(){
  document.getElementById("editorBackdrop").classList.add("open")
}

function closeEditor(){
  document.getElementById("editorBackdrop").classList.remove("open")
}

function save(){
  const text=document.getElementById("taskText").value
  if(!text)return

  const tasks=getTasks()
  tasks.push({
    text,
    date:document.getElementById("taskDate").value,
    time:document.getElementById("taskTime").value
  })

  saveTasks(tasks)
  closeEditor()
  render()
}

render()
</script>

</body>
</html>
