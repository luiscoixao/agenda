<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6f7bf7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mes Tâches" />
  <title>Mes Tâches</title>
  <style>
    :root {
      --bg: #f5f7ff;
      --card: #ffffff;
      --text: #1b1f35;
      --muted: #6b7280;
      --line: #e6eaf5;
      --primary: #6f7bf7;
      --primary-dark: #5563eb;
      --success: #1f9d63;
      --danger: #e35d6a;
      --shadow: 0 12px 30px rgba(37, 56, 140, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #eef2ff 0%, #f8f9ff 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100%;
    }

    body {
      padding: calc(env(safe-area-inset-top, 0px) + 18px) 16px calc(env(safe-area-inset-bottom, 0px) + 28px);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    .hero {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      border-radius: 28px;
      padding: 22px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    input, select, button {
      font: inherit;
    }

    .field, .select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      color: var(--text);
      outline: none;
      transition: 0.18s ease;
    }

    .field:focus, .select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(111, 123, 247, 0.12);
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-soft {
      background: #eef1ff;
      color: var(--primary-dark);
    }
    .btn-danger {
      background: #fff1f2;
      color: var(--danger);
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .chip.active {
      background: #eef1ff;
      color: var(--primary-dark);
      border-color: #dbe1ff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      background: #fafbff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }

    .stat strong {
      display: block;
      font-size: 1.4rem;
      letter-spacing: -0.03em;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .search-wrap {
      margin-top: 12px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .task {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      background: #fff;
    }

    .task.done {
      opacity: 0.72;
      background: #fbfcff;
    }

    .check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #cfd6f9;
      background: white;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    .task.done .check {
      background: var(--success);
      border-color: var(--success);
    }

    .task.done .check::after {
      content: "✓";
      color: white;
      font-weight: 800;
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 14px;
    }

    .task-title {
      font-weight: 700;
      line-height: 1.3;
      word-break: break-word;
    }

    .task.done .task-title {
      text-decoration: line-through;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: #f4f6fd;
      border: 1px solid var(--line);
    }

    .empty {
      text-align: center;
      padding: 28px 18px;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 12px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }

    @media (min-width: 640px) {
      .top-actions {
        grid-template-columns: 1.5fr 0.8fr 0.9fr auto;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Mes Tâches</h1>
      <p class="subtitle">Une liste de tâches simple, jolie et efficace, prête pour GitHub Pages et facile à utiliser sur iPhone.</p>
    </section>

    <section class="panel">
      <div class="top-actions">
        <input id="taskInput" class="field" type="text" placeholder="Ajouter une tâche..." />
        <input id="taskDate" class="field" type="date" />
        <select id="taskPriority" class="select">
          <option value="Normale">Normale</option>
          <option value="Importante">Importante</option>
          <option value="Urgente">Urgente</option>
        </select>
        <button id="addBtn" class="btn btn-primary" type="button">Ajouter</button>
      </div>

      <div class="stats">
        <div class="stat"><strong id="todoCount">0</strong><span>à faire</span></div>
        <div class="stat"><strong id="todayCount">0</strong><span>aujourd’hui</span></div>
        <div class="stat"><strong id="doneCount">0</strong><span>terminées</span></div>
      </div>

      <div class="chips">
        <button class="chip active" data-filter="all">Toutes</button>
        <button class="chip" data-filter="today">Aujourd’hui</button>
        <button class="chip" data-filter="upcoming">À venir</button>
        <button class="chip" data-filter="done">Terminées</button>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="field" type="text" placeholder="Rechercher..." />
      </div>
    </section>

    <section class="panel">
      <div id="taskList" class="list"></div>
      <div id="emptyState" class="empty">Ajoute ta première tâche pour commencer.</div>
      <p class="footer-note">Les tâches sont sauvegardées automatiquement dans le navigateur.</p>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'mes-taches-github-pages-v1';
    const taskInput = document.getElementById('taskInput');
    const taskDate = document.getElementById('taskDate');
    const taskPriority = document.getElementById('taskPriority');
    const addBtn = document.getElementById('addBtn');
    const searchInput = document.getElementById('searchInput');
    const taskList = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');
    const todoCount = document.getElementById('todoCount');
    const todayCount = document.getElementById('todayCount');
    const doneCount = document.getElementById('doneCount');
    const filterButtons = Array.from(document.querySelectorAll('.chip'));

    let tasks = loadTasks();
    let activeFilter = 'all';
    let searchTerm = '';

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function todayString() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) {
        taskInput.focus();
        return;
      }

      tasks.unshift({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        text,
        done: false,
        date: taskDate.value || '',
        priority: taskPriority.value,
        createdAt: Date.now()
      });

      taskInput.value = '';
      taskDate.value = '';
      taskPriority.value = 'Normale';
      saveTasks();
      render();
      taskInput.focus();
    }

    function toggleTask(id) {
      tasks = tasks.map(task => task.id === id ? { ...task, done: !task.done } : task);
      saveTasks();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      render();
    }

    function formatDate(value) {
      if (!value) return 'Sans date';
      const [y, m, d] = value.split('-');
      return `${d}/${m}/${y}`;
    }

    function filteredTasks() {
      const today = todayString();
      return tasks.filter(task => {
        const matchesSearch = task.text.toLowerCase().includes(searchTerm.toLowerCase());
        if (!matchesSearch) return false;

        if (activeFilter === 'today') return task.date === today && !task.done;
        if (activeFilter === 'upcoming') return !!task.date && task.date > today && !task.done;
        if (activeFilter === 'done') return task.done;
        return true;
      });
    }

    function updateStats() {
      const today = todayString();
      todoCount.textContent = tasks.filter(t => !t.done).length;
      todayCount.textContent = tasks.filter(t => t.date === today && !t.done).length;
      doneCount.textContent = tasks.filter(t => t.done).length;
    }

    function render() {
      updateStats();
      const items = filteredTasks();
      taskList.innerHTML = '';

      if (!items.length) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      items.forEach(task => {
        const article = document.createElement('article');
        article.className = `task ${task.done ? 'done' : ''}`;

        const priorityEmoji = task.priority === 'Urgente' ? '⚡️' : task.priority === 'Importante' ? '⭐️' : '•';

        article.innerHTML = `
          <button class="check" type="button" aria-label="Marquer la tâche"></button>
          <div>
            <div class="task-title">${escapeHtml(task.text)}</div>
            <div class="meta">
              <span class="badge">${priorityEmoji} ${task.priority}</span>
              <span class="badge">📅 ${formatDate(task.date)}</span>
            </div>
          </div>
          <button class="btn btn-danger delete-btn" type="button">Supprimer</button>
        `;

        article.querySelector('.check').addEventListener('click', () => toggleTask(task.id));
        article.querySelector('.delete-btn').addEventListener('click', () => deleteTask(task.id));
        taskList.appendChild(article);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') addTask();
    });
    searchInput.addEventListener('input', (event) => {
      searchTerm = event.target.value;
      render();
    });

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        activeFilter = button.dataset.filter;
        filterButtons.forEach(btn => btn.classList.toggle('active', btn === button));
        render();
      });
    });

    render();
  </script>
</body>
</html>
