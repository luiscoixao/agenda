<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="apple-touch-icon" href="icon.png" />
  <title>Rappels</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f3f3f6;
      --text: #111111;
      --muted: #a1a1aa;
      --accent: #ff0a78;
      --accent-soft: #ffe3f0;
      --danger: #ff3b30;
      --danger-soft: #ffe7e5;
      --edit: #0a84ff;
      --edit-soft: #e7f1ff;
      --line: #ececf1;
      --white: #ffffff;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 28px 18px 110px;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 26px;
      font-size: 46px;
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 800;
      color: var(--accent);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .task-shell {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
    }

    .task-actions {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .task-action-left,
    .task-action-right {
      width: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: 700;
    }

    .task-action-left {
      background: var(--edit);
    }

    .task-action-right {
      background: var(--danger);
    }

    .task {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding: 14px 6px 14px 0;
      min-height: 78px;
      background: transparent;
      transform: translateX(0);
      transition: transform 0.18s ease;
      touch-action: pan-y;
      border-radius: 22px;
    }

    .task + .task {
      border-top: 1px solid var(--line);
    }

    .task-bullet {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 2px solid #c9c9ce;
      background: transparent;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .task-main {
      min-width: 0;
    }

    .task-title {
      font-size: 18px;
      line-height: 1.25;
      font-weight: 500;
      word-break: break-word;
    }

    .task-meta {
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.3;
      color: var(--accent);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .task-empty {
      color: var(--muted);
      font-size: 17px;
      padding-top: 8px;
    }

    .next-task .task-title {
      font-weight: 700;
    }

    .editor-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      z-index: 1000;
    }

    .editor-backdrop.open {
      display: flex;
    }

    .editor-sheet {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 28px 28px 18px 18px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }

    .editor-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 16px;
      color: var(--accent);
    }

    .field {
      width: 100%;
      border: 1px solid #e7e7ec;
      border-radius: 18px;
      background: #fbfbfd;
      padding: 15px 16px;
      font-size: 17px;
      outline: none;
      margin-bottom: 12px;
    }

    .field:focus {
      border-color: var(--accent);
      background: #ffffff;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .btn {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
    }

    .btn-cancel {
      background: #f2f2f7;
      color: #555;
    }

    .btn-save {
      background: var(--accent);
      color: white;
    }

    .fab {
      position: fixed;
      right: 22px;
      bottom: 28px;
      width: 76px;
      height: 76px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 44px;
      line-height: 1;
      box-shadow: 0 14px 28px rgba(255, 10, 120, 0.28);
      cursor: pointer;
      z-index: 900;
    }

    .fab:active {
      transform: scale(0.97);
    }

    @media (max-width: 520px) {
      body {
        padding: 24px 16px 110px;
      }

      h1 {
        font-size: 40px;
      }

      .task {
        grid-template-columns: 48px minmax(0, 1fr);
        gap: 12px;
        min-height: 74px;
      }

      .task-bullet {
        width: 40px;
        height: 40px;
      }

      .fab {
        width: 72px;
        height: 72px;
        font-size: 42px;
        right: 18px;
        bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Rappels</h1>
    <div id="taskList" class="list"></div>
    <div id="emptyState" class="task-empty" style="display:none;">Aucun rappel</div>
  </div>

  <button id="fab" class="fab" aria-label="Ajouter">+</button>

  <div id="editorBackdrop" class="editor-backdrop">
    <div class="editor-sheet">
      <h2 id="editorTitle" class="editor-title">Nouveau rappel</h2>
      <input id="taskText" class="field" type="text" placeholder="Intitulé" />
      <div class="row">
        <input id="taskDate" class="field" type="date" />
        <input id="taskTime" class="field" type="time" value="09:00" />
      </div>
      <div class="actions">
        <button id="cancelBtn" class="btn btn-cancel">Annuler</button>
        <button id="saveBtn" class="btn btn-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <script>
    let editingId = null;

    function getTasks() {
      return JSON.parse(localStorage.getItem("tasks") || "[]");
    }

    function saveTasks(tasks) {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function getTaskTimestamp(task) {
      if (!task.date) return Number.MAX_SAFE_INTEGER;
      const time = task.time || "23:59";
      return new Date(task.date + "T" + time + ":00").getTime();
    }

    function sortTasks(tasks) {
      return tasks.sort((a, b) => getTaskTimestamp(a) - getTaskTimestamp(b));
    }

    function formatDateFr(date) {
      if (!date) return "";
      const d = new Date(date + "T00:00:00");
      return d.toLocaleDateString("fr-FR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    function formatRepeatLabel(task) {
      return task.repeat === "monthly" ? "↔ Tous les mois" : "";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function openEditor(task = null) {
      const backdrop = document.getElementById("editorBackdrop");
      const title = document.getElementById("editorTitle");
      const text = document.getElementById("taskText");
      const date = document.getElementById("taskDate");
      const time = document.getElementById("taskTime");

      if (task) {
        editingId = task.id;
        title.textContent = "Modifier le rappel";
        text.value = task.text || "";
        date.value = task.date || "";
        time.value = task.time || "09:00";
      } else {
        editingId = null;
        title.textContent = "Nouveau rappel";
        text.value = "";
        date.value = "";
        time.value = "09:00";
      }

      backdrop.classList.add("open");
      setTimeout(() => text.focus(), 50);
    }

    function closeEditor() {
      document.getElementById("editorBackdrop").classList.remove("open");
      editingId = null;
    }

    function saveEditor() {
      const text = document.getElementById("taskText").value.trim();
      const date = document.getElementById("taskDate").value;
      const time = document.getElementById("taskTime").value || "09:00";

      if (!text) return;

      const tasks = getTasks();

      if (editingId !== null) {
        const task = tasks.find(t => t.id === editingId);
        if (task) {
          task.text = text;
          task.date = date;
          task.time = time;
        }
      } else {
        tasks.push({
          id: Date.now(),
          text,
          date,
          time
        });
      }

      saveTasks(tasks);
      closeEditor();
      render();
    }

    function deleteTask(id) {
      const tasks = getTasks().filter(t => t.id !== id);
      saveTasks(tasks);
      render();
    }

    function render() {
      const list = document.getElementById("taskList");
      const empty = document.getElementById("emptyState");
      const tasks = sortTasks(getTasks());

      list.innerHTML = "";

      if (tasks.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      const dated = tasks.filter(t => t.date);
      const nextId = dated.length ? dated[0].id : null;

      tasks.forEach(task => {
        const shell = document.createElement("div");
        shell.className = "task-shell";

        const actions = document.createElement("div");
        actions.className = "task-actions";
        actions.innerHTML = `
          <div class="task-action-left">✏️</div>
          <div class="task-action-right">🗑️</div>
        `;

        const row = document.createElement("div");
        row.className = "task" + (task.id === nextId ? " next-task" : "");
        row.innerHTML = `
          <div class="task-bullet"></div>
          <div class="task-main">
            <div class="task-title">${escapeHtml(task.text)}</div>
            <div class="task-meta">
              ${task.date ? `<span>${formatDateFr(task.date)}</span>` : ""}
              ${task.time ? `<span>${task.time}</span>` : ""}
            </div>
          </div>
        `;

        shell.appendChild(actions);
        shell.appendChild(row);
        list.appendChild(shell);

        attachSwipe(row, {
          onEdit: () => openEditor(task),
          onDelete: () => deleteTask(task.id)
        });

        row.addEventListener("click", () => openEditor(task));
      });
    }

    function attachSwipe(el, handlers) {
      let startX = 0;
      let currentX = 0;
      let dragging = false;
      let moved = false;

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

      function start(x) {
        startX = x;
        currentX = 0;
        dragging = true;
        moved = false;
        el.style.transition = "none";
      }

      function move(x) {
        if (!dragging) return;
        currentX = clamp(x - startX, -96, 96);
        if (Math.abs(currentX) > 8) moved = true;
        el.style.transform = `translateX(${currentX}px)`;
      }

      function end() {
        if (!dragging) return;
        dragging = false;
        el.style.transition = "transform 0.18s ease";

        if (currentX <= -72) {
          el.style.transform = "translateX(-96px)";
          setTimeout(() => {
            el.style.transform = "translateX(0)";
            handlers.onDelete();
          }, 120);
        } else if (currentX >= 72) {
          el.style.transform = "translateX(96px)";
          setTimeout(() => {
            el.style.transform = "translateX(0)";
            handlers.onEdit();
          }, 120);
        } else {
          el.style.transform = "translateX(0)";
        }

        if (moved) {
          el.dataset.swiped = "1";
          setTimeout(() => {
            el.dataset.swiped = "0";
          }, 220);
        }
      }

      el.addEventListener("touchstart", e => start(e.touches[0].clientX), { passive: true });
      el.addEventListener("touchmove", e => move(e.touches[0].clientX), { passive: true });
      el.addEventListener("touchend", end);

      el.addEventListener("mousedown", e => start(e.clientX));
      window.addEventListener("mousemove", e => move(e.clientX));
      window.addEventListener("mouseup", end);

      el.addEventListener("click", e => {
        if (el.dataset.swiped === "1") {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);
    }

    document.getElementById("fab").addEventListener("click", () => openEditor());
    document.getElementById("cancelBtn").addEventListener("click", closeEditor);
    document.getElementById("saveBtn").addEventListener("click", saveEditor);

    document.getElementById("taskText").addEventListener("keydown", e => {
      if (e.key === "Enter") saveEditor();
    });

    document.getElementById("editorBackdrop").addEventListener("click", e => {
      if (e.target.id === "editorBackdrop") closeEditor();
    });

    render();
  </script>
</body>
</html>
