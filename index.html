<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClairTasks</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
background:#f2f3f7;
margin:0;
padding:20px;
}

.app{
max-width:600px;
margin:auto;
}

h1{
font-size:34px;
margin-bottom:20px;
}

.card{
background:white;
border-radius:22px;
padding:18px;
box-shadow:0 8px 22px rgba(0,0,0,0.08);
margin-bottom:18px;
}

.input-row{
display:flex;
gap:10px;
align-items:center;
}

.input-row input[type="text"]{
flex:1;
border:1px solid #d6dbea;
border-radius:14px;
padding:14px;
font-size:16px;
}

.date-btn{
display:flex;
align-items:center;
gap:6px;
background:#f0f3ff;
border-radius:14px;
padding:10px 12px;
}

.date-btn input{
border:none;
background:transparent;
font-size:15px;
}

.add-btn{
background:#007aff;
color:white;
border:none;
border-radius:14px;
padding:14px 16px;
font-weight:600;
font-size:18px;
}

ul{
list-style:none;
padding:0;
margin:0;
}

.task{
display:flex;
align-items:center;
gap:12px;
padding:14px 0;
border-bottom:1px solid #edf0f5;
}

.task:last-child{
border:none;
}

.task-title{
flex:1;
font-size:17px;
}

.task.done .task-title{
text-decoration:line-through;
color:#9aa3b2;
}

.task-date{
font-size:13px;
color:#6b7280;
}

.delete{
background:#ffe7e7;
border:none;
border-radius:10px;
padding:8px 10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="app">

<h1>Rappels</h1>

<div class="card">

<div class="input-row">

<input id="taskInput" placeholder="Nouvelle tâche">

<div class="date-btn">
📅
<input id="taskDate" type="date">
</div>

<button class="add-btn" onclick="addTask()">+</button>

</div>

</div>

<div class="card">

<ul id="taskList"></ul>

</div>

</div>

<script>

function getTasks(){
return JSON.parse(localStorage.getItem("tasks") || "[]")
}

function saveTasks(tasks){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function addTask(){

let input=document.getElementById("taskInput")
let date=document.getElementById("taskDate").value

let text=input.value.trim()

if(!text) return

let tasks=getTasks()

tasks.unshift({
id:Date.now(),
text:text,
date:date,
done:false
})

saveTasks(tasks)

input.value=""
document.getElementById("taskDate").value=""

render()

}

function toggle(id){

let tasks=getTasks().map(t=>{
if(t.id===id){
t.done=!t.done
}
return t
})

saveTasks(tasks)

render()

}

function remove(id){

let tasks=getTasks().filter(t=>t.id!==id)

saveTasks(tasks)

render()

}

function render(){

let list=document.getElementById("taskList")

list.innerHTML=""

let tasks=getTasks()

tasks.forEach(task=>{

let li=document.createElement("li")

li.className="task"+(task.done?" done":"")

let dateHTML=""
if(task.date){
dateHTML='<div class="task-date">📅 '+task.date+'</div>'
}

li.innerHTML=
'<input type="checkbox" '+(task.done?'checked':'')+'>'+
'<div class="task-title">'+task.text+dateHTML+'</div>'+
'<button class="delete">✕</button>'

li.querySelector("input").onclick=()=>toggle(task.id)

li.querySelector(".delete").onclick=()=>remove(task.id)

list.appendChild(li)

})

}

document.getElementById("taskInput").addEventListener("keydown",function(e){
if(e.key==="Enter"){
addTask()
}
})

render()

</script>

</body>
</html>
