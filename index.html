<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Stylé</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <svg style="display: none;">
        <symbol id="trash-icon" viewBox="0 0 24 24">
            <path d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M7,6H17V19H7V6M8,8V17H16V8H8M10,10V15H14V10H10Z" />
        </symbol>
    </svg>
    <div class="container">
        <h1>Agenda</h1>
        <div class="input-container">
            <input type="text" id="new-task-input" placeholder="Nouvelle tâche...">
            <input type="datetime-local" id="new-task-datetime">
            <button id="add-task-btn">+</button>
        </div>
        <ul id="task-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
