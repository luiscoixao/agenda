<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icon.png">
<title>Rappels</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  background:#f2f2f7;
  color:#111;
  padding:20px 16px 32px;
}

.app{
  max-width:680px;
  margin:auto;
}

h1{
  font-size:42px;
  margin:8px 4px 20px;
  font-weight:800;
  letter-spacing:-0.03em;
  line-height:1.05;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
  margin-bottom:16px;
}

.composer{
  display:flex;
  gap:10px;
  align-items:center;
}

.text-input{
  flex:1;
  min-width:0;
  border:1px solid #e5e5ea;
  border-radius:14px;
  height:48px;
  padding:0 14px;
  font-size:17px;
  outline:none;
  background:#fff;
}

.text-input:focus,
.time-input:focus{
  border-color:#0a84ff;
}

.date-wrap{
  position:relative;
  width:56px;
  height:48px;
  flex:0 0 56px;
  border-radius:14px;
  background:#f2f2f7;
  border:1px solid #e5e5ea;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.date-icon{
  font-size:22px;
  pointer-events:none;
}

.date-input{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}

.time-input{
  width:92px;
  flex:0 0 92px;
  height:48px;
  border:1px solid #e5e5ea;
  background:#f2f2f7;
  border-radius:14px;
  padding:0 10px;
  font-size:16px;
  outline:none;
  color:#111;
}

.add-btn{
  width:48px;
  height:48px;
  flex:0 0 48px;
  border:none;
  border-radius:14px;
  background:#0a84ff;
  color:#fff;
  font-size:28px;
  cursor:pointer;
}

.add-btn:active,
.edit-btn:active,
.delete-btn:active{
  transform:scale(0.97);
}

.task{
  display:grid;
  grid-template-columns:minmax(0,1fr) 40px 40px;
  gap:10px;
  align-items:center;
  padding:14px 10px;
  border-bottom:1px solid #f0f0f4;
  margin:0;
}

.task:last-child{
  border-bottom:none;
}

.task-main{
  min-width:0;
}

.task-title{
  font-size:17px;
  line-height:1.3;
  word-break:break-word;
}

.task-date{
  font-size:13px;
  color:#8e8e93;
  margin-top:4px;
  line-height:1.3;
}

.edit-btn{
  border:none;
  background:#eef3ff;
  color:#0a84ff;
  border-radius:12px;
  width:40px;
  height:40px;
  font-size:18px;
  cursor:pointer;
}

.delete-btn{
  border:none;
  background:#fff2f2;
  color:#ff3b30;
  border-radius:12px;
  width:40px;
  height:40px;
  font-size:18px;
  cursor:pointer;
}

.next-task{
  background:#e9f9ee;
  border-radius:14px;
}

.empty{
  text-align:center;
  color:#8e8e93;
  padding:30px 16px;
  font-size:17px;
}

@media (max-width:520px){
  body{
    padding:18px 12px 28px;
  }

  h1{
    font-size:38px;
    margin-bottom:18px;
  }

  .card{
    padding:12px;
  }

  .composer{
    gap:8px;
  }

  .date-wrap{
    width:52px;
    flex-basis:52px;
  }

  .time-input{
    width:84px;
    flex-basis:84px;
    font-size:15px;
    padding:0 8px;
  }

  .add-btn{
    width:46px;
    flex-basis:46px;
  }

  .task{
    grid-template-columns:minmax(0,1fr) 38px 38px;
    gap:8px;
    padding:12px 8px;
  }

  .edit-btn,
  .delete-btn{
    width:38px;
    height:38px;
    font-size:17px;
  }
}
</style>
</head>

<body>
<div class="app">

  <h1>Rappels</h1>

  <div class="card">
    <div class="composer">
      <input id="taskInput" class="text-input" placeholder="Nouvelle tâche">

      <label class="date-wrap" aria-label="Choisir une date">
        <span class="date-icon">📅</span>
        <input id="taskDate" class="date-input" type="date">
      </label>

      <input id="taskTime" class="time-input" type="time" value="09:00">

      <button class="add-btn" onclick="addTask()" aria-label="Ajouter">+</button>
    </div>
  </div>

  <div class="card">
    <div id="taskList"></div>
    <div id="emptyState" class="empty">Aucun rappel</div>
  </div>

</div>

<script>
function getTasks(){
  return JSON.parse(localStorage.getItem("tasks") || "[]");
}

function saveTasks(tasks){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function getTaskTimestamp(task){
  if(!task.date) return Number.MAX_SAFE_INTEGER;
  const time = task.time || "23:59";
  return new Date(task.date + "T" + time + ":00").getTime();
}

function sortTasks(tasks){
  return tasks.sort((a,b) => getTaskTimestamp(a) - getTaskTimestamp(b));
}

function formatDateTime(date, time){
  if(!date) return "";
  const d = new Date(date + "T" + (time || "00:00") + ":00");
  return d.toLocaleString("fr-FR", {
    day:"numeric",
    month:"long",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function addTask(){
  const input = document.getElementById("taskInput");
  const date = document.getElementById("taskDate").value;
  const time = document.getElementById("taskTime").value;
  const text = input.value.trim();

  if(!text) return;

  const tasks = getTasks();
  tasks.push({
    id: Date.now(),
    text: text,
    date: date,
    time: time
  });

  saveTasks(tasks);

  input.value = "";
  document.getElementById("taskDate").value = "";
  document.getElementById("taskTime").value = "09:00";

  render();
}

function deleteTask(id){
  const tasks = getTasks().filter(t => t.id !== id);
  saveTasks(tasks);
  render();
}

function editTask(id){
  const tasks = getTasks();
  const task = tasks.find(t => t.id === id);
  if(!task) return;

  const newText = prompt("Modifier l’intitulé :", task.text);
  if(newText === null) return;

  const cleanedText = newText.trim();
  if(!cleanedText) return;

  const newDate = prompt("Modifier la date (AAAA-MM-JJ) :", task.date || "");
  if(newDate === null) return;

  const cleanedDate = newDate.trim();

  const newTime = prompt("Modifier l’heure (HH:MM) :", task.time || "09:00");
  if(newTime === null) return;

  const cleanedTime = newTime.trim();

  task.text = cleanedText;
  task.date = cleanedDate;
  task.time = cleanedTime;

  saveTasks(tasks);
  render();
}

function render(){
  const list = document.getElementById("taskList");
  const empty = document.getElementById("emptyState");

  const tasks = sortTasks(getTasks());
  list.innerHTML = "";

  if(tasks.length === 0){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  const withDate = tasks.filter(t => t.date);
  const nextId = withDate.length ? withDate[0].id : null;

  tasks.forEach(task => {
    const row = document.createElement("div");
    row.className = "task";

    if(task.id === nextId){
      row.classList.add("next-task");
    }

    row.innerHTML = `
      <div class="task-main">
        <div class="task-title">${escapeHtml(task.text)}</div>
        ${task.date ? `<div class="task-date">${formatDateTime(task.date, task.time)}</div>` : ""}
      </div>
      <button class="edit-btn" aria-label="Modifier">✏️</button>
      <button class="delete-btn" aria-label="Supprimer">🗑️</button>
    `;

    row.querySelector(".edit-btn").onclick = () => editTask(task.id);
    row.querySelector(".delete-btn").onclick = () => deleteTask(task.id);

    list.appendChild(row);
  });
}

document.getElementById("taskInput").addEventListener("keydown", e => {
  if(e.key === "Enter") addTask();
});

render();
</script>
</body>
</html>
