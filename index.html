<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="apple-touch-icon" href="icon.png">
<title>Rappels</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --line:#ececf1;
  --text:#111111;
  --sub:#8e8e93;
  --blue:#0a84ff;
  --green:#e9f9ee;
  --green-border:#cfeeda;
  --red:#ff3b30;
  --red-soft:#fff1f0;
  --blue-soft:#eef4ff;
  --radius:22px;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
  padding:20px 14px 34px;
}

.app{
  max-width:720px;
  margin:0 auto;
}

h1{
  margin:8px 4px 20px;
  font-size:42px;
  line-height:1.02;
  font-weight:800;
  letter-spacing:-0.03em;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.06);
  margin-bottom:16px;
}

.composer{
  display:grid;
  grid-template-columns:minmax(0,1fr) 56px 92px 52px;
  gap:10px;
  align-items:center;
}

.text-input,
.time-input{
  border:1px solid #e5e5ea;
  background:#fff;
  border-radius:16px;
  height:50px;
  outline:none;
}

.text-input{
  min-width:0;
  padding:0 15px;
  font-size:17px;
}

.time-input{
  width:92px;
  padding:0 10px;
  font-size:16px;
  background:#f6f6fa;
}

.text-input:focus,
.time-input:focus{
  border-color:var(--blue);
}

.date-wrap{
  position:relative;
  width:56px;
  height:50px;
  border-radius:16px;
  background:#f6f6fa;
  border:1px solid #e5e5ea;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.date-icon{
  font-size:22px;
  pointer-events:none;
}

.date-input{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}

.add-btn{
  width:52px;
  height:50px;
  border:none;
  border-radius:16px;
  background:var(--blue);
  color:#fff;
  font-size:28px;
  line-height:1;
  cursor:pointer;
  font-weight:500;
}

.add-btn.save-mode{
  font-size:14px;
  font-weight:700;
}

.helper{
  margin-top:10px;
  padding-left:2px;
  min-height:18px;
  color:var(--sub);
  font-size:14px;
}

.list-card{
  padding:10px;
}

.empty{
  padding:34px 16px;
  text-align:center;
  color:var(--sub);
  font-size:17px;
}

.task-shell{
  position:relative;
  overflow:hidden;
  border-radius:18px;
  margin:8px 0;
}

.task-actions{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:space-between;
  align-items:stretch;
  pointer-events:none;
}

.action-left,
.action-right{
  width:92px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:#fff;
  font-weight:700;
}

.action-left{
  background:var(--blue);
}

.action-right{
  background:var(--red);
}

.task{
  position:relative;
  z-index:1;
  background:#fff;
  border:1px solid transparent;
  border-radius:18px;
  padding:16px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  transform:translateX(0);
  transition:transform 0.18s ease;
  touch-action:pan-y;
}

.task.next-task{
  background:var(--green);
  border-color:var(--green-border);
}

.task-main{
  min-width:0;
  flex:1;
}

.task-title{
  font-size:17px;
  line-height:1.3;
  word-break:break-word;
}

.task-date{
  margin-top:4px;
  font-size:13px;
  color:var(--sub);
}

.chevron{
  color:#c7c7cc;
  font-size:18px;
  flex:0 0 auto;
}

.editing-badge{
  display:inline-block;
  margin-top:8px;
  padding:6px 10px;
  border-radius:999px;
  background:var(--blue-soft);
  color:var(--blue);
  font-size:13px;
  font-weight:600;
}

.cancel-edit{
  margin-top:10px;
  border:none;
  background:#f3f3f7;
  color:#444;
  border-radius:12px;
  padding:10px 12px;
  font-size:14px;
  cursor:pointer;
}

@media (max-width:560px){
  body{
    padding:18px 12px 28px;
  }

  h1{
    font-size:38px;
  }

  .composer{
    grid-template-columns:minmax(0,1fr) 52px 84px 48px;
    gap:8px;
  }

  .date-wrap{
    width:52px;
    height:48px;
  }

  .time-input{
    width:84px;
    height:48px;
    font-size:15px;
  }

  .text-input{
    height:48px;
  }

  .add-btn{
    width:48px;
    height:48px;
  }

  .action-left,
  .action-right{
    width:84px;
  }

  .task{
    padding:15px 14px;
  }
}
</style>
</head>

<body>
<div class="app">
  <h1>Rappels</h1>

  <div class="card">
    <div class="composer">
      <input id="taskInput" class="text-input" type="text" placeholder="Nouvelle tâche">
      <label class="date-wrap" aria-label="Choisir une date">
        <span class="date-icon">📅</span>
        <input id="taskDate" class="date-input" type="date">
      </label>
      <input id="taskTime" class="time-input" type="time" value="09:00">
      <button id="addBtn" class="add-btn" aria-label="Ajouter">+</button>
    </div>

    <div id="helperText" class="helper"></div>
    <button id="cancelEditBtn" class="cancel-edit" style="display:none;">Annuler la modification</button>
  </div>

  <div class="card list-card">
    <div id="taskList"></div>
    <div id="emptyState" class="empty">Aucun rappel</div>
  </div>
</div>

<script>
let editingId = null;

function getTasks(){
  return JSON.parse(localStorage.getItem("tasks") || "[]");
}

function saveTasks(tasks){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function getTaskTimestamp(task){
  if(!task.date) return Number.MAX_SAFE_INTEGER;
  const time = task.time || "23:59";
  return new Date(task.date + "T" + time + ":00").getTime();
}

function sortTasks(tasks){
  return tasks.sort((a,b) => getTaskTimestamp(a) - getTaskTimestamp(b));
}

function formatDateTime(date, time){
  if(!date) return "";
  const d = new Date(date + "T" + (time || "00:00") + ":00");
  return d.toLocaleString("fr-FR", {
    day:"numeric",
    month:"long",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function setHelper(text){
  document.getElementById("helperText").textContent = text || "";
}

function resetForm(){
  document.getElementById("taskInput").value = "";
  document.getElementById("taskDate").value = "";
  document.getElementById("taskTime").value = "09:00";
  editingId = null;

  const btn = document.getElementById("addBtn");
  btn.textContent = "+";
  btn.classList.remove("save-mode");
  btn.setAttribute("aria-label","Ajouter");

  document.getElementById("cancelEditBtn").style.display = "none";
  setHelper("");
}

function fillForm(task){
  document.getElementById("taskInput").value = task.text || "";
  document.getElementById("taskDate").value = task.date || "";
  document.getElementById("taskTime").value = task.time || "09:00";
  editingId = task.id;

  const btn = document.getElementById("addBtn");
  btn.textContent = "OK";
  btn.classList.add("save-mode");
  btn.setAttribute("aria-label","Enregistrer");

  document.getElementById("cancelEditBtn").style.display = "inline-block";
  setHelper("Modification en cours");
  document.getElementById("taskInput").focus();
}

function addOrSaveTask(){
  const input = document.getElementById("taskInput");
  const date = document.getElementById("taskDate").value;
  const time = document.getElementById("taskTime").value;
  const text = input.value.trim();

  if(!text) return;

  const tasks = getTasks();

  if(editingId !== null){
    const task = tasks.find(t => t.id === editingId);
    if(task){
      task.text = text;
      task.date = date;
      task.time = time;
    }
  } else {
    tasks.push({
      id: Date.now(),
      text,
      date,
      time
    });
  }

  saveTasks(tasks);
  resetForm();
  render();
}

function deleteTask(id){
  const tasks = getTasks().filter(t => t.id !== id);
  saveTasks(tasks);
  if(editingId === id) resetForm();
  render();
}

function editTask(id){
  const task = getTasks().find(t => t.id === id);
  if(!task) return;
  fillForm(task);
}

function render(){
  const list = document.getElementById("taskList");
  const empty = document.getElementById("emptyState");
  const tasks = sortTasks(getTasks());

  list.innerHTML = "";

  if(tasks.length === 0){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  const withDate = tasks.filter(t => t.date);
  const nextId = withDate.length ? withDate[0].id : null;

  tasks.forEach(task => {
    const shell = document.createElement("div");
    shell.className = "task-shell";

    const row = document.createElement("div");
    row.className = "task" + (task.id === nextId ? " next-task" : "");
    row.innerHTML = `
      <div class="task-main">
        <div class="task-title">${escapeHtml(task.text)}</div>
        ${task.date ? `<div class="task-date">${formatDateTime(task.date, task.time)}</div>` : ""}
        ${editingId === task.id ? `<div class="editing-badge">En modification</div>` : ""}
      </div>
      <div class="chevron">›</div>
    `;

    const actions = document.createElement("div");
    actions.className = "task-actions";
    actions.innerHTML = `
      <div class="action-left">✏️</div>
      <div class="action-right">🗑️</div>
    `;

    shell.appendChild(actions);
    shell.appendChild(row);
    list.appendChild(shell);

    attachSwipe(row, {
      onEdit: () => editTask(task.id),
      onDelete: () => deleteTask(task.id)
    });

    row.addEventListener("click", () => editTask(task.id));
  });
}

function attachSwipe(el, handlers){
  let startX = 0;
  let currentX = 0;
  let dragging = false;
  let moved = false;

  const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

  const start = (x) => {
    startX = x;
    currentX = 0;
    dragging = true;
    moved = false;
    el.style.transition = "none";
  };

  const move = (x) => {
    if(!dragging) return;
    currentX = clamp(x - startX, -96, 96);
    if(Math.abs(currentX) > 6) moved = true;
    el.style.transform = `translateX(${currentX}px)`;
  };

  const end = () => {
    if(!dragging) return;
    dragging = false;
    el.style.transition = "transform 0.18s ease";

    if(currentX <= -72){
      el.style.transform = "translateX(-96px)";
      setTimeout(() => {
        el.style.transform = "translateX(0)";
        handlers.onDelete();
      }, 120);
    } else if(currentX >= 72){
      el.style.transform = "translateX(96px)";
      setTimeout(() => {
        el.style.transform = "translateX(0)";
        handlers.onEdit();
      }, 120);
    } else {
      el.style.transform = "translateX(0)";
    }

    setTimeout(() => {
      if(moved){
        el.dataset.swiped = "1";
        setTimeout(() => { el.dataset.swiped = "0"; }, 220);
      }
    }, 0);
  };

  el.addEventListener("touchstart", (e) => {
    start(e.touches[0].clientX);
  }, {passive:true});

  el.addEventListener("touchmove", (e) => {
    move(e.touches[0].clientX);
  }, {passive:true});

  el.addEventListener("touchend", end);

  el.addEventListener("mousedown", (e) => {
    start(e.clientX);
  });

  window.addEventListener("mousemove", (e) => {
    move(e.clientX);
  });

  window.addEventListener("mouseup", end);

  el.addEventListener("click", (e) => {
    if(el.dataset.swiped === "1"){
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);
}

document.getElementById("addBtn").addEventListener("click", addOrSaveTask);

document.getElementById("taskInput").addEventListener("keydown", (e) => {
  if(e.key === "Enter") addOrSaveTask();
});

document.getElementById("cancelEditBtn").addEventListener("click", () => {
  resetForm();
  render();
});

render();
</script>
</body>
</html>
